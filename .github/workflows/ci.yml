name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Linux binary (smoke test)
        run: |
          bun build --compile --minify --target=bun-linux-x64 ./src/index.ts ./src/worker.ts --outfile dist/wmtw-agent-linux-x64